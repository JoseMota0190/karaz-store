<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5C0F14">
  <title>Admin Karaz</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilos específicos del Admin Ultra-Intuitivo */
    :root {
      --admin-bg: #FDF8F3;
      --admin-card-bg: #FFFFFF;
      --admin-primary: #5C0F14;
      --admin-teal: #2BB5A0;
      --admin-gold: #D9BCA3;
      --admin-text: #333;
      --admin-gray: #666;
    }
    
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--admin-bg); margin: 0; }
    
    /* LOGIN */
    .login-page-simple {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--admin-bg);
      padding: 20px;
    }
    
    .login-card-simple {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    
    .login-card-simple h1 {
      color: var(--admin-primary);
      font-size: 1.8rem;
      margin: 0 0 8px;
      font-family: 'Times New Roman', serif;
    }
    
    .login-card-simple .subtitle {
      color: var(--admin-gray);
      font-size: 0.95rem;
      margin-bottom: 30px;
    }
    
    .login-card-simple input {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-bottom: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    
    .login-card-simple input:focus {
      outline: none;
      border-color: var(--admin-teal);
    }
    
    .login-card-simple .btn-ingresar {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: var(--admin-primary);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .login-card-simple .btn-ingresar:active {
      opacity: 0.9;
    }
    
    .login-card-simple .error {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    
    .login-card-simple .error.show {
      display: block;
    }
    
    .login-card-simple .btn-volver {
      display: block;
      margin-top: 20px;
      color: var(--admin-gray);
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    /* ADMIN MAIN */
    .admin-main {
      display: none;
      min-height: 100vh;
      background: var(--admin-bg);
    }
    
    .admin-main.show { display: block; }
    
    /* Topbar */
    .admin-topbar-simple {
      background: var(--admin-primary);
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-topbar-simple .brand {
      font-family: 'Times New Roman', serif;
      font-size: 1.3rem;
    }
    
    .admin-topbar-simple .actions {
      display: flex;
      gap: 12px;
    }
    
    .admin-topbar-simple .actions a,
    .admin-topbar-simple .actions button {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    
    /* FILTROS */
    .admin-filtros {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #eee;
      overflow-x: auto;
    }
    
    .admin-filtros::-webkit-scrollbar { display: none; }
    
    .filtro-btn {
      display: inline-block;
      padding: 10px 16px;
      border: none;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 0.9rem;
      margin-right: 8px;
      margin-bottom: 8px;
      white-space: nowrap;
      cursor: pointer;
    }
    
    .filtro-btn.active {
      background: var(--admin-primary);
      color: white;
    }
    
    /* BUSQUEDA */
    .admin-busqueda {
      padding: 16px 20px;
    }
    
    .admin-busqueda input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
    }
    
    .admin-busqueda input:focus {
      outline: none;
      border-color: var(--admin-teal);
    }
    
    /* GRID */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 16px 20px;
    }
    
    @media (max-width: 768px) {
      .admin-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 480px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
    
    .product-card-admin {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .product-card-admin:active {
      transform: scale(0.98);
    }
    
    .product-card-admin img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #f5f5f5;
    }
    
    .product-card-admin .info {
      padding: 12px;
    }
    
    .product-card-admin .nombre {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .product-card-admin .precio {
      color: var(--admin-primary);
      font-size: 1.1rem;
      font-weight: 700;
    }
    
    /* BOTON NUEVO */
    .admin-nuevo-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--admin-teal);
      color: white;
      border: none;
      padding: 18px 28px;
      font-size: 1.1rem;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(43,181,160,0.4);
      cursor: pointer;
      font-weight: 600;
    }
    
    .admin-nuevo-btn:active {
      transform: scale(0.95);
    }
    
    /* MODAL */
    .modal-overlay-simple {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal-overlay-simple.show { display: flex; }
    
    .modal-simple {
      background: white;
      width: 90%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 20px;
    }
    
    .modal-header-simple {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header-simple h2 {
      margin: 0;
      font-size: 1.2rem;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
    }
    
    .modal-body-simple { padding: 20px; }
    
    .form-group-simple {
      margin-bottom: 20px;
    }
    
    .form-group-simple label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    
    .form-group-simple input,
    .form-group-simple select {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
    }
    
    .form-group-simple input:focus,
    .form-group-simple select:focus {
      outline: none;
      border-color: var(--admin-teal);
    }
    
    /* UPLOAD FOTO */
    .upload-simple {
      border: 2px dashed #ddd;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
    }
    
    .upload-simple:active { background: #f9f9f9; }
    
    .upload-simple .icono {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    
    .upload-simple .text {
      color: #666;
      font-size: 0.95rem;
    }
    
    .upload-preview-simple {
      border-radius: 12px;
      overflow: hidden;
    }
    
    .upload-preview-simple img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
    
    .upload-preview-simple .change-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #f5f5f5;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
    
    /* CATEGORIAS RADIO */
    .categoria-opciones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .categoria-opcion {
      display: flex;
      align-items: center;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
    }
    
    .categoria-opcion.active {
      border-color: var(--admin-primary);
      background: #fdf8f5;
    }
    
    .categoria-opcion input { display: none; }
    
    /* BOTONES FOOTER */
    .modal-footer-simple {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 12px;
    }
    
    .btn-simple {
      flex: 1;
      padding: 16px;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .btn-guardar {
      background: var(--admin-primary);
      color: white;
    }
    
    .btn-cancelar {
      background: #f0f0f0;
      color: #333;
    }
    
    /* OTROS BOTONES */
    .btn-foto-adicional {
      display: block;
      width: 100%;
      padding: 12px;
      background: none;
      border: 2px dashed #ddd;
      border-radius: 12px;
      color: #666;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 12px;
    }
    
    /* MENU TARJETA */
    .tarjeta-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      display: none;
      z-index: 1001;
    }
    
    .tarjeta-menu.show { display: block; }
    
    .tarjeta-menu .opcion {
      display: flex;
      align-items: center;
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    
    .tarjeta-menu .opcion.editar { color: var(--admin-primary); }
    .tarjeta-menu .opcion.eliminar { color: #e74c3c; }
    
    .tarjeta-menu .cerrar {
      width: 100%;
      padding: 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
    }

    /* PRODUCT COUNT */
    .admin-count {
      padding: 0 20px 16px;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- LOGIN SIMPLE -->
  <div class="login-page-simple" id="login-page">
    <div class="login-card-simple">
      <h1>🔐 Karaz Admin</h1>
      <p class="subtitle">Ingresa tu contraseña</p>
      <div class="error" id="login-error">Datos incorrectos</div>
      <input type="text" id="login-pass" placeholder="Contraseña" autocomplete="current-password">
      <button class="btn-ingresar" id="login-btn">Ingresar</button>
      <a href="index.html" class="btn-volver">← Volver a la tienda</a>
    </div>
  </div>

  <!-- ADMIN PRINCIPAL -->
  <div class="admin-main" id="admin-main">
    <!-- Topbar -->
    <div class="admin-topbar-simple">
      <span class="brand">Karaz Admin</span>
      <div class="actions">
        <a href="index.html" target="_blank">Ver tienda</a>
        <button id="admin-logout">Salir</button>
      </div>
    </div>

    <!-- Filtros -->
    <div class="admin-filtros" id="filtros">
      <button class="filtro-btn active" data-cat="">📷 Todos</button>
      <button class="filtro-btn" data-cat="anillos">💍 Anillos</button>
      <button class="filtro-btn" data-cat="pulseras">💎 Pulseras</button>
      <button class="filtro-btn" data-cat="collares">📿 Collares</button>
      <button class="filtro-btn" data-cat="aretes">🎀 Aretes</button>
      <button class="filtro-btn" data-cat="earcuffs">🎧 Earcuffs</button>
      <button class="filtro-btn" data-cat="sets">✨ Sets</button>
    </div>

    <!-- Busqueda -->
    <div class="admin-busqueda">
      <input type="text" id="search-products" placeholder="🔍 Buscar producto...">
    </div>

    <!-- Cantidad -->
    <div class="admin-count" id="product-count"></div>

    <!-- Grid -->
    <div class="admin-grid" id="admin-grid"></div>

    <!-- Boton Nuevo -->
    <button class="admin-nuevo-btn" id="add-product-btn">+ Nuevo producto</button>
  </div>

  <!-- MENU TARJETA (al tocar producto) -->
  <div class="tarjeta-menu" id="tarjeta-menu">
    <button class="opcion editar" id="menu-editar">✏️ Editar producto</button>
    <button class="opcion eliminar" id="menu-eliminar">🗑️ Eliminar producto</button>
    <button class="cerrar" id="menu-cerrar">Cancelar</button>
  </div>

  <!-- MODAL FORMULARIO -->
  <div class="modal-overlay-simple" id="product-modal">
    <div class="modal-simple">
      <div class="modal-header-simple">
        <h2 id="modal-title">Nuevo producto</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      
      <div class="modal-body-simple">
        <!-- Foto principal -->
        <div class="form-group-simple">
          <label>Foto del producto</label>
          <div class="upload-simple" id="upload-area">
            <div class="icono">📷</div>
            <div class="text">Toca para agregar foto</div>
          </div>
          <div class="upload-preview-simple" id="img-preview" style="display:none">
            <img id="img-preview-img" src="">
            <button class="change-btn" id="btn-change-img">Cambiar foto</button>
          </div>
          <input type="file" id="f-image-file" accept="image/*" style="display:none">
          <input type="hidden" id="f-image-url">
        </div>

        <!-- Nombre -->
        <div class="form-group-simple">
          <label>Nombre</label>
          <input type="text" id="f-name" placeholder="Ej: Pulsera Tibetana">
        </div>

        <!-- Precio -->
        <div class="form-group-simple">
          <label>Precio ($)</label>
          <input type="number" id="f-price" placeholder="25" min="0">
        </div>

        <!-- Categoria -->
        <div class="form-group-simple">
          <label>Categoría</label>
          <div class="categoria-opciones" id="categoria-opciones">
            <label class="categoria-opcion"><input type="radio" name="cat" value="anillos"> 💍 Anillos</label>
            <label class="categoria-opcion"><input type="radio" name="cat" value="pulseras"> 💎 Pulseras</label>
            <label class="categoria-opcion"><input type="radio" name="cat" value="collares"> 📿 Collares</label>
            <label class="categoria-opcion"><input type="radio" name="cat" value="aretes"> 🎀 Aretes</label>
            <label class="categoria-opcion"><input type="radio" name="cat" value="earcuffs"> 🎧 Earcuffs</label>
            <label class="categoria-opcion"><input type="radio" name="cat" value="sets"> ✨ Sets</label>
          </div>
        </div>

        <!-- Fotos adicionales botones -->
        <button class="btn-foto-adicional" id="add-foto2" style="display:none">+ Agregar otra foto</button>
        <button class="btn-foto-adicional" id="add-foto3" style="display:none">+ Agregar otra foto</button>
      </div>

      <div class="modal-footer-simple">
        <button class="btn-simple btn-cancelar" id="modal-cancel">Cancelar</button>
        <button class="btn-simple btn-guardar" id="save-product-btn">Guardar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Admin SIMPLE - Ultra intuitivo
    const API_URL = 'https://aguamarina-backend-q7gd.onrender.com';
    const STORE_ID = 'karaz';
    let allProducts = [];
    let filteredProducts = [];
    let selectedProduct = null;
    let editingId = null;

    // Login
    document.getElementById('login-pass').addEventListener('keyup', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('admin-logout').addEventListener('click', () => { localStorage.removeItem(STORE_ID + '_admin_logged'); location.reload(); });

    async function doLogin() {
      const pass = document.getElementById('login-pass').value;
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('show');
      
      try {
        const res = await fetch(API_URL + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-store-id': STORE_ID },
          body: JSON.stringify({ password: pass })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem(STORE_ID + '_admin_logged', pass);
          showAdminPanel();
        } else {
          errorEl.classList.add('show');
        }
      } catch {
        errorEl.textContent = 'Sin conexión';
        errorEl.classList.add('show');
      }
    }

    // Verificar si ya está logueado
    if (localStorage.getItem(STORE_ID + '_admin_logged')) {
      showAdminPanel();
    }

    function showAdminPanel() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('admin-main').classList.add('show');
      loadProducts();
      setupEventos();
    }

    async function loadProducts() {
      try {
        const res = await fetch(API_URL + '/api/productos', { headers: { 'x-store-id': STORE_ID } });
        allProducts = await res.json();
        filtrarYrender();
      } catch (e) { console.error(e); }
    }

    function setupEventos() {
      // Filtros
      document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filtrarYrender();
        });
      });

      // Busqueda
      document.getElementById('search-products').addEventListener('input', filtrarYrender);

      // Nuevo producto
      document.getElementById('add-product-btn').addEventListener('click', () => openModal(null));
      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('save-product-btn').addEventListener('click', saveProduct);
      document.getElementById('btn-change-img').addEventListener('click', () => document.getElementById('f-image-file').click());

      // Upload foto
      document.getElementById('upload-area').addEventListener('click', () => document.getElementById('f-image-file').click());
      document.getElementById('f-image-file').addEventListener('change', handleImageUpload);

      // Menu tarjeta
      document.getElementById('menu-editar').addEventListener('click', () => { hideMenu(); openModal(selectedProduct); });
      document.getElementById('menu-eliminar').addEventListener('click', () => { hideMenu(); deleteProduct(selectedProduct.id); });
      document.getElementById('menu-cerrar').addEventListener('click', hideMenu);

      // Categorias radio
      document.querySelectorAll('.categoria-opcion').forEach(op => {
        op.addEventListener('click', () => {
          document.querySelectorAll('.categoria-opcion').forEach(o => o.classList.remove('active'));
          op.classList.add('active');
        });
      });
    }

    function filtrarYrender() {
      const catActive = document.querySelector('.filtro-btn.active').dataset.cat;
      const search = document.getElementById('search-products').value.toLowerCase();

      filteredProducts = allProducts.filter(p => {
        const matchCat = !catActive || p.category === catActive;
        const matchSearch = !search || (p.name && p.name.toLowerCase().includes(search));
        return matchCat && matchSearch;
      });

      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('admin-grid');
      document.getElementById('product-count').textContent = filteredProducts.length + ' productos';
      
      grid.innerHTML = filteredProducts.map(p => `
        <div class="product-card-admin" onclick="seleccionarProducto('${p.id}')">
          <img src="${p.image || 'https://placehold.co/300x300/f5f5f5/999?text=📷'}" alt="${p.name}">
          <div class="info">
            <div class="nombre">${p.name || 'Sin nombre'}</div>
            <div class="precio">$${p.price || 0}</div>
          </div>
        </div>
      `).join('');
    }

    function seleccionarProducto(producto) {
      selectedProduct = allProducts.find(p => p.id === producto);
      if (selectedProduct) {
        document.getElementById('tarjeta-menu').classList.add('show');
      }
    }

    function hideMenu() {
      document.getElementById('tarjeta-menu').classList.remove('show');
    }

    function openModal(producto) {
      editingId = producto ? producto.id : null;
      document.getElementById('modal-title').textContent = producto ? 'Editar producto' : 'Nuevo producto';
      
      document.getElementById('f-name').value = producto?.name || '';
      document.getElementById('f-price').value = producto?.price || '';
      
      // Categoria
      document.querySelectorAll('.categoria-opcion').forEach(o => {
        o.classList.remove('active');
        if (o.querySelector('input').value === producto?.category) o.classList.add('active');
      });
      
      // Foto
      if (producto?.image) {
        document.getElementById('upload-area').style.display = 'none';
        document.getElementById('img-preview').style.display = 'block';
        document.getElementById('img-preview-img').src = producto.image;
        document.getElementById('f-image-url').value = producto.image;
      } else {
        document.getElementById('upload-area').style.display = 'block';
        document.getElementById('img-preview').style.display = 'none';
        document.getElementById('img-preview-img').src = '';
        document.getElementById('f-image-url').value = '';
      }

      document.getElementById('product-modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('product-modal').classList.remove('show');
    }

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('upload-area').style.display = 'none';
        document.getElementById('img-preview').style.display = 'block';
        document.getElementById('img-preview-img').src = e.target.result;
        uploadToCloudinary(file);
      };
      reader.readAsDataURL(file);
    }

    function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', 'aguamarina');
      
      fetch('https://api.cloudinary.com/v1_1/dh6kkq9w7/image/upload', {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if (data.secure_url) {
          document.getElementById('f-image-url').value = data.secure_url;
        }
      })
      .catch(console.error);
    }

    async function saveProduct() {
      const name = document.getElementById('f-name').value.trim();
      const price = parseInt(document.getElementById('f-price').value);
      
      if (!name || isNaN(price)) {
        alert('Completa nombre y precio');
        return;
      }

      const categoria = document.querySelector('.categoria-opcion.active input')?.value || 'anillos';
      const password = localStorage.getItem(STORE_ID + '_admin_logged');
      const data = {
        nombre: name,
        precio: price,
        categoria: categoria,
        imagen: document.getElementById('f-image-url').value
      };

      try {
        if (editingId) {
          await fetch(API_URL + '/api/productos/' + editingId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'x-store-id': STORE_ID, 'x-admin-password': password },
            body: JSON.stringify(data)
          });
        } else {
          data.codigo = 'NEW-' + Date.now();
          await fetch(API_URL + '/api/productos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-store-id': STORE_ID, 'x-admin-password': password },
            body: JSON.stringify(data)
          });
        }
        closeModal();
        await loadProducts();
      } catch (e) {
        alert('Error al guardar');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      
      const password = localStorage.getItem(STORE_ID + '_admin_logged');
      
      try {
        await fetch(API_URL + '/api/productos/' + id, {
          method: 'DELETE',
          headers: { 'x-store-id': STORE_ID, 'x-admin-password': password }
        });
        await loadProducts();
      } catch (e) {
        alert('Error al eliminar');
      }
    }
  </script>
</body>
</html>
